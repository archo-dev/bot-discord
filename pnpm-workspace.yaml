packages:
  - "packages/*"

onlyBuiltDependencies:
  - esbuild
  - workerd
  - sharp

# Force @discordjs/voice 0.19.2 everywhere (incl. inside DisTube) for DAVE/E2EE
# support — Discord rejects voice with 0.18.x (close code 4017). See gateway deps
# (@snazzah/davey). Lives here (not package.json) as newer pnpm ignores pnpm.overrides.
overrides:
  "@discordjs/voice": "0.19.2"

# Patch @distube/yt-dlp@2.0.1 (latest; bug unfixed upstream): the plugin merged
# yt-dlp's stderr into stdout and JSON.parse'd the result inside the child's
# `close` handler, so any stderr line (e.g. the "--no-call-home" deprecation
# notice) threw an uncaught SyntaxError → crashed the gateway → systemd restart.
# The patch separates the streams, wraps JSON.parse in try/catch (reject, never
# throw), and drops the deprecated noCallHome flag. See patches/ for the diff.
patchedDependencies:
  "@distube/yt-dlp@2.0.1": patches/@distube__yt-dlp@2.0.1.patch
